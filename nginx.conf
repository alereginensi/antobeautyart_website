worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Hide Nginx version
    server_tokens off;

    # Performance
    sendfile        on;
    keepalive_timeout  65;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security Headers
        
        # X-Frame-Options: Prevent clickjacking
        add_header X-Frame-Options "DENY" always;
        
        # X-Content-Type-Options: Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        
        # X-XSS-Protection: Enable XSS filtering
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Referrer-Policy: Control referrer information
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Permissions-Policy: Disable features not used
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        
        # Strict-Transport-Security (HSTS): Enforce HTTPS (Assumes running behind SSL proxy in prod)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Content-Security-Policy (CSP)
        # Allows: Self, Google Fonts, and inline styles/scripts necessary for current implementation
        add_header Content-Security-Policy "default-src 'self'; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
